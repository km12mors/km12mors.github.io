<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        main{
            text-align: center;
            
        }
        body{
            display:flex;
            justify-content: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            width: 600px;
            gap: 4px;
        }

        .container div {
            width: 80px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
    </style>

</head>

<body>
    <main>
        <h1>Prime Numbers Game</h1>
        <div class="container"></div>
    </main>

    <script>
        const div = document.querySelector(".container");
        for (let i = 0; i < 101; i++) {
            let box = document.createElement("div");
            box.textContent = i;

            if(i % 2 == 0){
                box.style.backgroundColor = "green";
            }
            else{
                box.style.backgroundColor = "red";
            }
            div.appendChild(box);
        }
    </script>
</body>

</html>
