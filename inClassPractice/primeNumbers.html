<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Number Generator</title>
    <style>
        .wrapper {
            display: flex;
            flex-wrap: wrap;
            width: 600px;
            gap: 4px;
        }

        .wrapper div {
            width: 80px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <main>
        <h1>Number Generator</h1>
        <div class="wrapper"></div>
    </main>


    <script>
        const div = document.querySelector(".wrapper");

        for (let i = 0; i < 101; i++) {
            let box = document.createElement("div");
            box.textContent = i;

            if (isPrime(i)) {
                box.style.backgroundColor = "yellow";
                box.style.color = "black";
            }
            else if (i % 2 === 0) {
                box.style.backgroundColor = "green";
            }
            else {
                box.style.backgroundColor = "red";
            }

            div.appendChild(box);
        }

        function isPrime(num) {
            if (num < 2) return false;

            for (let i = 2; i < num; i++) {
                if (num % i == 0) {
                    return false;
                }
            }

            return true;
        }

    </script>
</body>

</html>
