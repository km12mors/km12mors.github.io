<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<main class="container">

    <body>
        <h1>Add Expenses</h1>
        <form id=expenseForm>
            <div class="mb-3">
                <label for="place" class="form-label">Place of Expense:</label>
                <input type="text" class="form-control" id="place" minlength="5">
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Expense Date:</label>
                <input type="date" class="form-control" id="date">
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Expense Amount:</label>
                <input type="number" step = ".01" class="form-control" id="amount" min = ".01" max = "4999.99">
            </div>

            <label for="category" class="form-label">Expense Category:</label>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="groceries" id="groceries">
                <label class="form-check-label" for="groceries">
                    Groceries
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="business" id="business">
                <label class="form-check-label" for="business">
                    Business
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="restaurants" id="restaurants">
                <label class="form-check-label" for="restaurants">
                    Restaurants
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="fun" id="fun">
                <label class="form-check-label" for="fun">
                    Fun!
                </label>
            </div>

            <div class="mb-3">
                <label for="payment" class="form-label">Mode of Payment:</label>
                <select name="payment" class="form-select" id="payment" required>
                    <option value="credit">Credit Card</option>
                    <option selected value="debit">Debit Card</option>
                    <option value="cash">Cash</option>
                </select>
            </div>
            <input class="btn btn-primary" id="submit" type="submit" value="Submit">
        </form>
        <script src="expenses.js" defer></script>
    </body>
</main>

</html>
